project:
  name: employee-attrition-mlops
  experiment_name: employee_attrition_experiments
  random_state: 42

data:
  raw_path: data/raw/employee_attrition.csv
  target: Attrition
  test_size: 0.20
  missing_value_rate: 0.05
  data_version: employee_attrition_v1

model:
  type: logistic_regression
  C: 1.0
  max_iter: 1000
  class_weight: balanced

evaluation:
  primary_metric: f1
  minimum_f1: 0.40
  minimum_accuracy: 0.70
  minimum_roc_auc: 0.65

artifacts:
  model_path: models/logistic_regression.joblib
  metrics_path: reports/logistic_regression_metrics.json

monitoring:
  drift_share_threshold: 0.10
  report_path: reports/data_drift_report.html