project:
  name: employee-attrition-mlops
  experiment_name: employee_attrition_experiments
  random_state: 42

data:
  raw_path: data/raw/employee_attrition.csv
  target: Attrition
  test_size: 0.20
  missing_value_rate: 0.05
  data_version: employee_attrition_v1

model:
  type: random_forest
  n_estimators: 200
  max_depth: 10
  min_samples_split: 4
  class_weight: balanced

evaluation:
  primary_metric: f1
  minimum_f1: 0.50
  minimum_accuracy: 0.75
  minimum_roc_auc: 0.65

artifacts:
  model_path: models/attrition_model.joblib
  metrics_path: reports/metrics.json

monitoring:
  drift_share_threshold: 0.10
  report_path: reports/data_drift_report.html